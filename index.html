    <script>
      const navLinks = document.querySelectorAll(".nav-link");
      const boxes = document.querySelectorAll(".box");

      function pulse(el) {
        el.classList.remove("pulse"); // remove animation class
        void el.offsetWidth; // force reflow
        el.classList.add("pulse"); // re-add class → animation restarts
      }

      navLinks.forEach((link) => {
        link.addEventListener("click", (e) => {
          const hrefAttr = link.getAttribute("href");

          if (hrefAttr.startsWith("#")) {
            e.preventDefault();

            const href = hrefAttr.substring(1); // remove #

            if (href === "pages") {
              // "All" link
              boxes.forEach(pulse); // pulse all boxes
              // Scroll to top with padding
              window.scrollTo({ top: 20, behavior: "smooth" });
            } else {
              const box = document.getElementById(href);
              if (box) {
                pulse(box);
                // Scroll to element with padding from top
                const offset = 20; // distance from top
                const topPos =
                  box.getBoundingClientRect().top + window.scrollY - offset;
                window.scrollTo({ top: topPos, behavior: "smooth" });
              }
            }
          }

          // Update active class for all links
          navLinks.forEach((l) => l.classList.remove("active"));
          link.classList.add("active");
        });
      });

      const slider = document.querySelector(".slider");

      let isDown = false;
      let start;
      let scrollStart;
      let isVertical = false;

      function updateDirection() {
        isVertical = window.innerWidth <= 768;
      }
      updateDirection();
      window.addEventListener("resize", updateDirection);

      slider.addEventListener("mousedown", (e) => {
        isDown = true;
        start = isVertical ? e.pageY : e.pageX;
        scrollStart = isVertical ? slider.scrollTop : slider.scrollLeft;
      });

      ["mouseup", "mouseleave"].forEach((ev) =>
        slider.addEventListener(ev, () => (isDown = false))
      );

      slider.addEventListener("mousemove", (e) => {
        if (!isDown) return;
        e.preventDefault();

        const current = isVertical ? e.pageY : e.pageX;
        const walk = (current - start) * 1.5;

        if (isVertical) {
          slider.scrollTop = scrollStart - walk;
        } else {
          slider.scrollLeft = scrollStart - walk;
        }
      });

      function copyPText(box) {
        const p = box.querySelector("p");
        if (!p) return; // nothing to copy if no <p>

        navigator.clipboard
          .writeText(p.textContent)
          .then(() => {
            const snackbar = document.getElementById("snackbar");
            snackbar.classList.add("show");

            setTimeout(() => {
              snackbar.classList.remove("show");
            }, 2000);
          })
          .catch((err) => console.error("Failed to copy:", err));
      }
    </script>
