<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="project.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <linka
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <a href="index.html"
        ><i class="fa-solid fa-arrow-left"></i> Back to Home</a
      >
    </nav>

    <header>
      <h1>Projects</h1>
      <p>
        A collection of things I've built. Click GitHub to view the source code.
      </p>
    </header>

    <div class="grid" id="grid"></div>

    <script>
      const projects = [
        {
          title: "JustChat",
          type: "Personal",
          desc: "A Flutter-based messaging app with 1-on-1 text chat, Google Auth, real-time Firestore syncing, and push notifications.",
          image: "asset/jc1.webp",
          emoji: "💬",
          tags: ["Flutter", "Firebase", "Dart", "Authentication"],
          github: "https://github.com/dheljohn/JustChat",
          demo: "",
        },
        {
          title: "FaceMark",
          type: "Personal",
          desc: "Face recognition attendance system using Python and face-api.js for facial detection, updating Excel logs automatically.",
          image: "asset/FaceD1.webp",
          emoji: "👤",
          tags: ["Python", "HTML/CSS", "JavaScript", "Excel / CSV"],
          github: "https://github.com/dheljohn/Face-recognition-attendance",
          demo: "",
        },
        {
          title: "SoMo",
          type: "Thesis",
          desc: "Soil monitoring app with ESP32 and sensors for real-time data via Wi-Fi and Firebase, enabling live and historical tracking.",
          image: "asset/somoWebp.webp",
          emoji: "🌱",
          tags: ["Flutter", "Firebase", "Dart", "Cloud Firestore"],
          github: "https://github.com/dheljohn/bantay",
          demo: "",
        },
        {
          title: "Job Tracker",
          type: "Personal",
          desc: "A mobile app that helps users track job applications, monitor their progress, and stay organized throughout the hiring process.",
          image: "asset/jobMockUP.webp",
          emoji: "👨‍💼",
          tags: ["HTML/CSS", "JavaScript", "DOM Manipulation"],
          github: "https://github.com/dheljohn/Jobtrack",
          demo: "",
        },
        {
          title: "Bantay",
          type: "Personal",
          desc: "A safety app that monitors user-defined safe routes and automatically alerts emergency contacts via SMS if the user strays too far from the route.",
          image: "asset/bantay.webp",
          emoji: "🛡",
          tags: ["Flutter", "Dart"],
          github: "https://github.com/dheljohn/bantay",
          demo: "",
        },
      ];

      // Render cards
      const grid = document.getElementById("grid");

      projects.forEach((p, i) => {
        const typeKey = p.type.toLowerCase();

        const imgHTML = p.image
          ? `<img src="${p.image}" alt="${p.title}" />`
          : `<div class="placeholder">${p.emoji || "📁"}</div>`;

        const githubBtn = p.github
          ? `<a class="btn primary" href="${p.github}" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>`
          : "";

        const demoBtn = p.demo
          ? `<a class="btn" href="${p.demo}" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Demo</a>`
          : "";

        const tagsHTML = p.tags
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${i * 0.08}s`;
        card.innerHTML = `
          <div class="card-img">
            ${imgHTML}
            <span class="badge ${typeKey}">${p.type}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <p class="card-desc">${p.desc}</p>
            <div class="tags">${tagsHTML}</div>
          </div>
          ${githubBtn || demoBtn ? `<div class="card-footer">${githubBtn}${demoBtn}</div>` : ""}
        `;
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
